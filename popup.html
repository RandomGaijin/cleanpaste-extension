<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>CleanPaste</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
   
    <h1>CleanPaste</h1>
    
    <label for="original">Original</label>
    <textarea id="original" placeholder="Clipboard will appear here..." readonly></textarea>

<button id="readBtn">Load Clipboard</button>

<button id="cleanBtn">Clean Clipboard</button>

    <label for="cleaned">Cleaned</label>
    <textarea id="cleaned" placeholder="Cleaned text will appear here..." readonly></textarea>

    <button id="copyBtn">Copy Cleaned Text</button>

    <p id="status"></p>


    <script src="popup.js"></script>


</body>
</html>
